<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nuovo messaggio — Rena Bianca Beach Bar</title>
</head>
<body style="margin:0;padding:0;background-color:#040c18;font-family:Arial,Helvetica,sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:linear-gradient(160deg,#04090f 0%,#071625 50%,#0b2540 100%)">
<tr><td align="center" style="padding:36px 16px 52px">
<table width="580" cellpadding="0" cellspacing="0" border="0" style="max-width:580px;width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.10);border-radius:24px;overflow:hidden">

  <!-- HEADER -->
  <tr>
    <td style="padding:44px 40px 36px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.07)">
      <table cellpadding="0" cellspacing="0" border="0" style="margin:0 auto 16px"><tr><td style="background:rgba(255,255,255,0.92);border-radius:10px;padding:10px 28px"><img src="https://www.renabiancabeachbar.com/logo.svg" alt="Rena Bianca Beach Bar" width="200" height="67" style="display:block" /></td></tr></table>
      <div style="color:rgba(232,220,200,0.35);font-size:9px;letter-spacing:0.3em;text-transform:uppercase">Nuovo messaggio dal sito web</div>
    </td>
  </tr>

  <!-- DATA FIELDS -->
  <tr>
    <td style="padding:36px 44px 8px">
      <div style="margin-bottom:6px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.22em;color:#62a4e8">Mittente</div>
      <div style="margin-bottom:28px;font-size:16px;color:#e8dcc8;font-weight:500;line-height:1.5">{{1.name}}</div>
      <div style="margin-bottom:6px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.22em;color:#62a4e8">Email</div>
      <div style="margin-bottom:28px;font-size:14px;line-height:1.5"><a href="mailto:{{1.email}}" style="color:#62a4e8;text-decoration:none">{{1.email}}</a></div>
      <div style="margin-bottom:6px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.22em;color:#62a4e8">Telefono</div>
      <div style="margin-bottom:28px;font-size:14px;color:rgba(200,220,240,0.80);line-height:1.5">{{1.phoneDisplay}}</div>
      <div style="height:1px;background:rgba(255,255,255,0.07);margin:0 0 28px"></div>
      <div style="margin-bottom:10px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.22em;color:#62a4e8">Messaggio</div>
    </td>
  </tr>

  <!-- MESSAGE -->
  <tr>
    <td style="padding:0 44px 36px">
      <table cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr>
          <td style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-left:2px solid #62a4e8;padding:18px 22px;border-radius:0 14px 14px 0;font-style:italic;font-size:14px;color:rgba(200,220,240,0.78);line-height:1.8">{{1.message}}</td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- META INFO -->
  <tr>
    <td style="padding:0 44px 40px">
      <div style="height:1px;background:rgba(255,255,255,0.07);margin:0 0 24px"></div>
      <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td width="34%" style="vertical-align:top">
            <div style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.22em;color:#62a4e8;margin-bottom:6px">Lingua</div>
            <div style="font-size:13px;color:rgba(200,220,240,0.60);text-transform:uppercase">{{1.language}}</div>
          </td>
          <td width="33%" style="vertical-align:top">
            <div style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.22em;color:#62a4e8;margin-bottom:6px">Data</div>
            <div style="font-size:13px;color:rgba(200,220,240,0.60)">{{1.date}}</div>
          </td>
          <td width="33%" style="vertical-align:top">
            <div style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.22em;color:#62a4e8;margin-bottom:6px">Origine</div>
            <div style="font-size:13px;color:rgba(200,220,240,0.60)">{{1.source}}</div>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- FOOTER -->
  <tr>
    <td style="padding:20px 44px;text-align:center;border-top:1px solid rgba(255,255,255,0.07)">
      <div style="font-size:10px;color:rgba(200,220,240,0.22);line-height:1.7">&copy; 2026 Rena Bianca Beach Bar &amp; Restaurant<br>Spiaggia di Rena Bianca, Santa Teresa Gallura, Sardegna</div>
    </td>
  </tr>

</table>
</td></tr>
</table>
</body>
</html>
